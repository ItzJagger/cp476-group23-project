<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="utf-8">
   <title>Smoke - Store Home</title>
   <link rel="stylesheet" href="storehome.css" />
</head>
<body>

<header>
   <h1>
      <img src="../images/Smoke_bold.png" alt="Company Logo">
   </h1>
</header>

<nav>
   <a href="LibraryHome.html" class="nav-tab">Library</a>
   <button type="button" class="nav-tab nav-active">Store</button>
   <span id="creditsDisplay" style="margin-left:auto; padding: 10px; color: #333;">Credits: ...</span>
   <button type="button" id="logoutBtn" style="margin-left:10px;">Logout</button>
</nav>

<main>
   <div class="search-container">
      <label for="search">Search</label>
      <input type="text" id="search" name="search" placeholder="Search games...">
      <button type="button" id="searchBtn">Search</button>
   </div>

   <section class="featured-section">
      <h2>Featured Games</h2>
      <div class="game-grid" id="gameGrid">
         <p>Loading games...</p>
      </div>
   </section>

   <section class="genre-section">
      <h2>Search By Genre</h2>
      <div class="genre-grid">
         <button type="button" class="genre-button" onclick="searchByGenre('action')"><span class="genre-name">Action</span></button>
         <button type="button" class="genre-button" onclick="searchByGenre('adventure')"><span class="genre-name">Adventure</span></button>
         <button type="button" class="genre-button" onclick="searchByGenre('RPG')"><span class="genre-name">RPG</span></button>
         <button type="button" class="genre-button" onclick="searchByGenre('strategy')"><span class="genre-name">Strategy</span></button>
         <button type="button" class="genre-button" onclick="searchByGenre('racing')"><span class="genre-name">Racing</span></button>
         <button type="button" class="genre-button" onclick="searchByGenre('simulation')"><span class="genre-name">Simulation</span></button>
         <button type="button" class="genre-button" onclick="searchByGenre('survival')"><span class="genre-name">Survival</span></button>
         <button type="button" class="genre-button" onclick="searchByGenre('sports')"><span class="genre-name">Sports</span></button>
      </div>
   </section>
</main>

<script>
   const token = localStorage.getItem('token');

   if (!token) {
      window.location.href = 'signin.html';
   }

   document.getElementById('creditsDisplay').textContent = 'Credits: ' + (localStorage.getItem('credits') || '0');

   document.getElementById('logoutBtn').addEventListener('click', function() {
      localStorage.clear();
      window.location.href = 'signin.html';
   });

   const gamePageMap = {
      1: 'storegamepage.html?id=1',
      2: 'storegamepage.html?id=2',
      3: 'storegamepage.html?id=3',
      4: 'storegamepage.html?id=4',
      5: 'storegamepage.html?id=5'
   };

   const gameThumbnails = {
      1: 'Games/NeonCityIMGs/NeonCityMain.png',
      2: 'Games/MysticValeIMGs/MysticValeMain.png',
      3: 'Games/StarForgeIMGs/StarForgeMain.png',
      4: 'Games/StrikerEliteIMGs/StrikerMain.png',
      5: 'Games/HarvestHavenIMGs/HarvestMain.png'
   };

   function renderGames(games) {
      const grid = document.getElementById('gameGrid');
      grid.innerHTML = '';

      if (games.length === 0) {
         grid.innerHTML = '<p>No games found.</p>';
         return;
      }

      games.forEach(function(game) {
         const card = document.createElement('div');
         card.className = 'game-card';
         const page = gamePageMap[game.gameID] || 'storegamepage.html?id=' + game.gameID;
         const img = gameThumbnails[game.gameID] || 'Games/Smoke_bold.png';
         card.innerHTML = `
            <div class="game-image">
               <img src="${img}" alt="${game.title}">
            </div>
            <h3 class="game-title">${game.title}</h3>
            <p class="game-price">${game.price} Credits</p>
            <p class="game-description">${game.description ? game.description.substring(0, 80) + '...' : ''}</p>
            <a href="${page}" class="view-button">View Game</a>
         `;
         grid.appendChild(card);
      });
   }

   async function loadGames(url) {
      try {
         const response = await fetch(url);
         const data = await response.json();
         renderGames(data.games);
      } catch (err) {
         document.getElementById('gameGrid').innerHTML = '<p>Could not load games.</p>';
      }
   }

   function searchByGenre(genre) {
      loadGames('http://127.0.0.1:3000/api/games/search?genre=' + genre);
   }

   document.getElementById('searchBtn').addEventListener('click', function() {
      const query = document.getElementById('search').value.trim();
      if (query) {
         loadGames('http://127.0.0.1:3000/api/games/search?query=' + encodeURIComponent(query));
      } else {
         loadGames('http://127.0.0.1:3000/api/games');
      }
   });

   document.getElementById('search').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
         document.getElementById('searchBtn').click();
      }
   });

   loadGames('http://127.0.0.1:3000/api/games');
</script>

</body>
</html>
