<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="utf-8">
   <title>Smoke - Library</title>
   <link rel="stylesheet" href="libraryhome.css" />
</head>
<body>

<header>
   <h1>
      <img src="../images/Smoke_bold.png" alt="Company Logo">
   </h1>
</header>

<nav>
   <button type="button" class="nav-tab nav-active">Library</button>
   <a href="storehome.html" class="nav-tab">Store</a>
   <span id="creditsDisplay" style="margin-left:auto; padding: 10px; color: white;">Credits: ...</span>
   <button type="button" id="logoutBtn" style="margin-left:10px;">Logout</button>
</nav>

<main>
   <aside>
      <h2>Your Games</h2>
      <ul class="game-list" id="gameList">
         <li>Loading your games...</li>
      </ul>
   </aside>

   <section class="game-details" id="gameDetails">
      <p>Select a game from your library to view details.</p>
   </section>
</main>

<script>
   const token = localStorage.getItem('token');
   const username = localStorage.getItem('username');

   if (!token) {
      window.location.href = 'signin.html';
   }

   document.getElementById('creditsDisplay').textContent = 'Credits: ' + (localStorage.getItem('credits') || '0');

   document.getElementById('logoutBtn').addEventListener('click', function() {
      localStorage.clear();
      window.location.href = 'signin.html';
   });

   const gamePageMap = {
      1: 'Games/Game1.html',
      2: 'Games/Game2.html',
      3: 'Games/Game3.html',
      4: 'Games/Game4.html',
      5: 'Games/Game5.html'
   };

   async function loadLibrary() {
      try {
         const response = await fetch('http://127.0.0.1:3000/api/library', {
            headers: { 'Authorization': 'Bearer ' + token }
         });

         if (response.status === 401 || response.status === 403) {
            localStorage.clear();
            window.location.href = 'signin.html';
            return;
         }

         const data = await response.json();
         const gameList = document.getElementById('gameList');
         gameList.innerHTML = '';

         if (data.games.length === 0) {
            gameList.innerHTML = '<li>You have no games yet. Visit the store!</li>';
            return;
         }

         data.games.forEach(function(game) {
            const li = document.createElement('li');
            const page = gamePageMap[game.gameID];
            if (page) {
               li.innerHTML = '<a href="' + page + '" class="game-button">' + game.title + '</a>';
            } else {
               li.innerHTML = '<span class="game-button">' + game.title + '</span>';
            }
            gameList.appendChild(li);
         });

      } catch (err) {
         document.getElementById('gameList').innerHTML = '<li>Could not load library.</li>';
      }
   }

   loadLibrary();
</script>

</body>
</html>
