<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="utf-8">
   <title>Smoke - Game Details</title>
   <link rel="stylesheet" href="storegamepage.css" />
</head>
<body>

<header>
   <h1>
      <img src="Games/Smoke_bold.png" alt="Company Logo">
   </h1>
</header>

<main>
   <section class="game-image-section">
      <div class="main-image">
         <img id="mainImage" src="Games/Smoke_bold.png" alt="Game Image">
      </div>
      <div class="thumbnail-gallery" id="thumbnailGallery">
      </div>
   </section>

   <section class="game-info-section">
      <div class="description-box">
         <h2 id="gameTitle">Loading...</h2>
         <p id="gameDescription"></p>
      </div>

      <div class="developer-box">
         <h3>Developer</h3>
         <p id="gameDeveloper">...</p>
      </div>

      <div class="rating-box">
         <h3>Rating</h3>
         <p id="gameRating">...</p>
         <p id="gamePrice">...</p>
         <p id="gamePurchases">...</p>
      </div>

      <div class="categories-box">
         <h3>Categories/Genres</h3>
         <p id="gameGenres">...</p>
      </div>

      <p id="statusMsg" style="color:green; display:none;"></p>
      <p id="errorMsg" style="color:red; display:none;"></p>

      <button type="button" class="purchase-button" id="purchaseBtn" style="display:none;">Purchase</button>
      <a href="storehome.html" class="back-button">Back to Store</a>
   </section>
</main>

<script>
   const token = localStorage.getItem('token');

   if (!token) {
      window.location.href = 'signin.html';
   }

   const params = new URLSearchParams(window.location.search);
   const gameId = params.get('id');

   if (!gameId) {
      window.location.href = 'storehome.html';
   }

   const gameThumbnails = {
      1: 'Games/NeonCityIMGs/NeonCityMain.png',
      2: 'Games/MysticValeIMGs/MysticValeMain.png',
      3: 'Games/StarForgeIMGs/StarForgeMain.png',
      4: 'Games/StrikerEliteIMGs/StrikerMain.png',
      5: 'Games/HarvestHavenIMGs/HarvestMain.png'
   };

   async function loadGame() {
      try {
         const gameRes = await fetch('http://127.0.0.1:3000/api/games/' + gameId);
         const gameData = await gameRes.json();
         const game = gameData.game;

         document.title = 'Smoke - ' + game.title;
         document.getElementById('gameTitle').textContent = game.title;
         document.getElementById('gameDescription').textContent = game.description;
         document.getElementById('gameDeveloper').textContent = game.developer || 'Unknown';
         document.getElementById('gamePrice').textContent = 'Price: ' + game.price + ' Credits';
         document.getElementById('gamePurchases').textContent = 'Global Purchases: ' + game.purchase_count;
         document.getElementById('gameGenres').textContent = game.genres || 'N/A';
         document.getElementById('mainImage').src = gameThumbnails[parseInt(gameId)] || 'Games/Smoke_bold.png';

         const reviewRes = await fetch('http://127.0.0.1:3000/api/reviews/game/' + gameId);
         const reviewData = await reviewRes.json();
         if (reviewData.averageRating) {
            document.getElementById('gameRating').textContent = '⭐ ' + reviewData.averageRating + ' / 5 (' + reviewData.count + ' reviews)';
         } else {
            document.getElementById('gameRating').textContent = 'No reviews yet';
         }

         const ownRes = await fetch('http://127.0.0.1:3000/api/library/check/' + gameId, {
            headers: { 'Authorization': 'Bearer ' + token }
         });
         const ownData = await ownRes.json();

         const purchaseBtn = document.getElementById('purchaseBtn');
         if (ownData.owned) {
            purchaseBtn.textContent = 'Already Owned';
            purchaseBtn.disabled = true;
            purchaseBtn.style.display = 'inline-block';
         } else {
            purchaseBtn.textContent = 'Purchase for ' + game.price + ' Credits';
            purchaseBtn.style.display = 'inline-block';
            purchaseBtn.addEventListener('click', () => purchaseGame(game.price));
         }

      } catch (err) {
         document.getElementById('gameTitle').textContent = 'Could not load game.';
      }
   }

   async function purchaseGame(price) {
      const statusMsg = document.getElementById('statusMsg');
      const errorMsg = document.getElementById('errorMsg');
      const purchaseBtn = document.getElementById('purchaseBtn');

      try {
         const response = await fetch('http://127.0.0.1:3000/api/library/' + gameId, {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token }
         });

         const data = await response.json();

         if (!response.ok) {
            errorMsg.textContent = data.error || 'Purchase failed.';
            errorMsg.style.display = 'block';
            return;
         }

         localStorage.setItem('credits', data.remainingCredits);

         statusMsg.textContent = 'Purchase successful! Remaining credits: ' + data.remainingCredits;
         statusMsg.style.display = 'block';
         purchaseBtn.textContent = 'Already Owned';
         purchaseBtn.disabled = true;

      } catch (err) {
         errorMsg.textContent = 'Could not connect to server.';
         errorMsg.style.display = 'block';
      }
   }

   loadGame();
</script>

</body>
</html>
